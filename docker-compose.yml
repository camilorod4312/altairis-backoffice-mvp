services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: altairis-db
    env_file:
      - .env
    environment:
      SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  backend:
    build:
      context: ./backend
      dockerfile: Altairis.Api/dockerfile
    env_file:
      - .env
    ports:
      - "5000:8080"
    depends_on:
      - db
    environment:
      - ConnectionStrings__Default=Server=db;Database=${MSSQL_DB};User=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True
      - Auth__JwtSigningKey=${JWT_SIGNING_KEY}
      - Auth__JwtIssuer=${JWT_ISSUER}
      - Auth__JwtAudience=${JWT_AUDIENCE}
      - ASPNETCORE_ENVIRONMENT=Development

  frontend:
    build:
      context: ./frontend/nextjs-app
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}

volumes:
  sql_data: