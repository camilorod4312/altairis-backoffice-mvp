version: "3.9"

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: altairis-db
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  backend:
    build: ./backend/Altairis.Api
    ports:
      - "5000:8080"
    depends_on:
      - db
    environment:
      - ConnectionStrings__Default=Server=db;Database=AltairisDb;User=sa;Password=Your_password123;TrustServerCertificate=True

  frontend:
    build: ./frontend/nextjs-app
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080

volumes:
  sql_data: